<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="云监控,ServerStatus中文版,ServerStatus,ServerStatus cppla" />
    <title>Server Status</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="css/app.css?v=127" />
</head>
<body>
    <header class="topbar">
        <div class="brand" title="Server Status">
            <span class="logo-mark" aria-hidden="true">
                <svg viewBox="0 0 128 86" width="24" height="18" fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 46H28L38 34L55 82L65 4L74 47H88M100 47H110M122 47H126" />
                </svg>
            </span>
            <span class="logo-text"><span class="logo-accent">Server</span>Status</span>
        </div>
        <nav class="nav" id="navTabs">
            <button data-tab="servers" class="active">主机</button>
            <button data-tab="monitors">服务</button>
            <button data-tab="ssl">证书</button>
            <button data-tab="config">配置</button>
        </nav>
        <div class="actions">
            <button id="layoutToggle" title="切换布局" aria-label="切换布局" class="layout-btn">
                <svg class="layout-icon-table" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="14" height="4" rx="1"/><rect x="1" y="9" width="14" height="4" rx="1"/><line x1="8" y1="3" x2="8" y2="13"/></svg>
                <svg class="layout-icon-cards" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="14" height="3" rx="1"/><rect x="1" y="6.5" width="14" height="3" rx="1"/><rect x="1" y="12" width="14" height="3" rx="1"/></svg>
            </button>
            <button id="themeToggle" title="切换主题" aria-label="切换主题">
                <svg class="theme-icon-light" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="3"/><path d="M8 1v1M8 14v1M14 8h1M1 8h1M12.2 3.8l.7-.7M3.1 12.9l.7-.7M3.8 3.8l-.7-.7M12.9 12.9l-.7-.7"/></svg>
                <svg class="theme-icon-dark" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 10.3A6 6 0 1 1 5.7 2.5 5 5 0 0 0 13.5 10.3Z"/></svg>
            </button>
            <span id="lastUpdate" class="muted">更新中...</span>
        </div>
    </header>

    <main class="wrapper">
        <div id="loader" class="wave-loader">
            <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div id="mainContent">


        <section class="ops-overview" id="overviewCards" aria-label="运行概览">
            <div class="overview-card"><span class="label">在线主机</span><span class="value">—</span><span class="hint">加载中...</span></div>
            <div class="overview-card"><span class="label">本月上行</span><span class="value">—</span><span class="hint">加载中...</span></div>
            <div class="overview-card"><span class="label">本月下行</span><span class="value">—</span><span class="hint">加载中...</span></div>
            <div class="overview-card"><span class="label">证书风险</span><span class="value">—</span><span class="hint">加载中...</span></div>
            <div class="overview-card"><span class="label">活跃告警</span><span class="value">—</span><span class="hint">加载中...</span></div>
        </section>

        <section class="ops-toolbar" id="serversToolbar" aria-label="主机筛选">
            <div class="toolbar-group">
                <label for="serverSearch">搜索</label>
                <input id="serverSearch" type="search" autocomplete="off" placeholder="节点 / 地区 / 系统 / 主机名" />
            </div>
            <div class="toolbar-group">
                <span class="toolbar-label" aria-hidden="true">&nbsp;</span>
                <div class="segmented" id="statusFilter" role="group" aria-label="状态筛选">
                    <button data-filter="all" class="active">全部</button>
                    <button data-filter="online">在线</button>
                    <button data-filter="offline">离线</button>
                    <button data-filter="alert" title="只显示在线但资源、丢包或流量异常的节点">异常</button>
                </div>
            </div>
            <div class="toolbar-group">
                <label for="osFilter">系统</label>
                <select id="osFilter">
                    <option value="all">全部系统</option>
                </select>
            </div>
            <div class="toolbar-group">
                <label for="sortSelect">排序</label>
                <select id="sortSelect">
                    <option value="name">节点</option>
                    <option value="status">在线状态</option>
                    <option value="load">负载</option>
                    <option value="cpu">CPU</option>
                    <option value="memory">内存</option>
                    <option value="hdd">硬盘</option>
                    <option value="traffic">月流量</option>
                    <option value="loss">丢包</option>
                </select>
            </div>
            <div class="toolbar-group">
                <span class="toolbar-label" aria-hidden="true">&nbsp;</span>
                <button id="sortDirection" class="icon-text sort-dir" title="切换排序方向">降序</button>
            </div>
        </section>

        <section id="panel-servers" class="panel active" aria-labelledby="主机">
            <div class="table-wrap">
                <table class="data" id="serversTable">
                    <thead>
                    <tr>
                        <th data-sort="status">协议</th>
                        <th data-sort="traffic">月流量 ↓|↑</th>
                        <th data-sort="name">节点</th>
                        <th data-sort="type">虚拟化</th>
                        <th data-sort="location">位置</th>
                        <th>在线</th>
                        <th data-sort="load">负载</th>
                        <th>当前网络 ↓|↑</th>
                        <th>总流量 ↓|↑</th>
                        <th data-sort="cpu">CPU</th>
                        <th data-sort="memory">内存</th>
                        <th data-sort="hdd">硬盘</th>
                        <th data-sort="loss" style="text-align:center;">联通|电信|移动</th>
                    </tr>
                    </thead>
                    <tbody id="serversBody"></tbody>
                </table>
            </div>
            <!-- 移动端卡片布局 -->
            <div id="serversCards" class="cards" style="display:none;"></div>
        </section>

        <section id="panel-monitors" class="panel" aria-labelledby="服务">
            <div class="table-wrap">
                <table class="data" id="monitorsTable">
                    <thead>
                    <tr>
                        <th>协议</th>
                        <th>监测节点</th>
                        <th>监测位置</th>
                        <th>监测内容</th>
                    </tr>
                    </thead>
                    <tbody id="monitorsBody"></tbody>
                </table>
            </div>
            <!-- 移动端卡片布局 (服务) -->
            <div id="monitorsCards" class="cards" style="display:none;"></div>
        </section>

        <section id="panel-ssl" class="panel" aria-labelledby="证书">
            <div class="table-wrap">
                <table class="data" id="sslTable">
                    <thead>
                    <tr>
                        <th>名称</th>
                        <th>域名</th>
                        <th>端口</th>
                        <th>剩余(天)</th>
                        <th>到期(UTC)</th>
                        <th>状态</th>
                    </tr>
                    </thead>
                    <tbody id="sslBody"></tbody>
                </table>
            </div>
            <!-- 移动端卡片布局 (证书) -->
            <div id="sslCards" class="cards" style="display:none;"></div>
        </section>

        <section id="panel-config" class="panel" aria-labelledby="配置">
            <div class="config-grid">
                <section class="admin-card">
                    <div class="section-head">
                        <div>
                            <h2>配置管理</h2>
                            <p class="muted">可编辑节点、服务监测、证书与告警规则，保存后自动重载。</p>
                        </div>
                        <div class="section-actions">
                            <button id="adminReload" class="icon-text">重载配置</button>
                            <button id="adminRestart" class="danger-btn">重启服务</button>
                        </div>
                    </div>
                    <div id="adminStatus" class="admin-status">正在检测管理 API...</div>
                    <form id="adminTokenForm" class="admin-login">
                        <label class="search-field">
                            <span>管理令牌</span>
                            <input id="adminToken" type="password" autocomplete="current-password" placeholder="ADMIN_TOKEN" />
                        </label>
                        <button type="submit" class="primary-btn">连接</button>
                    </form>
                    <div class="segmented config-tabs" id="configTypeTabs" role="group" aria-label="配置类型">
                        <button type="button" data-type="servers" class="active">节点</button>
                        <button type="button" data-type="monitors">监测</button>
                        <button type="button" data-type="sslcerts">证书</button>
                        <button type="button" data-type="watchdog">告警</button>
                    </div>
                    <div class="config-actions">
                        <button id="addConfigItemBtn" class="primary-btn">新增节点</button>
                        <button id="refreshConfigBtn" class="icon-text">刷新配置</button>
                    </div>
                    <div id="configItemList" class="config-list"></div>
                </section>
                <section class="admin-card">
                    <div class="section-head">
                        <div>
                            <h2 id="configEditorTitle">新增节点</h2>
                            <p class="muted" id="configEditorHint">保存后会写入 config.json，并由 Go 服务热重载。</p>
                        </div>
                    </div>
                    <form id="configForm" class="config-form">
                        <div id="configFields" class="config-fields"></div>
                        <div class="form-actions">
                            <button type="submit" class="primary-btn">保存配置</button>
                            <button type="button" id="resetTrafficBtn" class="warn-btn" style="display:none;">重置月流量</button>
                            <button type="button" id="deleteConfigItemBtn" class="danger-btn">删除配置</button>
                            <button type="button" id="resetConfigFormBtn" class="icon-text">清空</button>
                        </div>
                    </form>
                </section>
            </div>
        </section>
        </div>
    </main>

    <!-- 详情抽屉 -->
    <div id="detailModal" class="modal-backdrop" style="display:none;">
        <aside class="modal-box detail-modal" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
            <button class="modal-close" id="detailClose" aria-label="关闭">×</button>
            <h3 id="detailTitle" class="modal-title">节点详情</h3>
            <div id="detailContent" class="modal-content">加载中...</div>
        </aside>
    </div>

    <script src="js/app.js?v=36" defer></script>
</body>
</html>
