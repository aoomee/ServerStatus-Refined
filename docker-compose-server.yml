services:
  serverstatus:
    image: ghcr.io/aoomee/serverstatus-refined:latest
    container_name: serverstatus-server
    restart: unless-stopped
    ports:
      - "16888:80"       # WebUI
      - "35601:35601"    # Agent 上报
    volumes:
      - ./server/config.json:/app/config/config.json
      - ./web/json:/app/data
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
