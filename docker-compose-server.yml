version: '3'

services:
  serverstatus:
    image: ghcr.io/aoomee/serverstatus-refined:latest
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: serverstatus-server
    restart: unless-stopped
    ports:
      - "16888:80"
      - "35601:35601"
    volumes:
      - ./server/config.json:/app/config/config.json
      - ./web/json:/app/data
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
